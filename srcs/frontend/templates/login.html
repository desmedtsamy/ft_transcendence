<div class="row justify-content-center">
	<div class="col-md-6 col-lg-4">
		<div class="card shadow-sm">
			<div class="card-body">
				<h1 class="card-title text-center mb-4">Login</h1>
				<form id="login-form" onsubmit="LoginForm(); return false;">
					<!-- Hidden fields for security -->
					<input type="text" name="username" style="position: absolute; left: -9999px;">
					<input type="password" name="password" style="position: absolute; left: -9999px;">
					
					<div class="mb-3">
						<input class="form-control" type="text" id="username_input" placeholder="Username" required>
					</div>
					<div class="mb-3">
						<input class="form-control" type="password" id="password" placeholder="Password" required>
					</div>
					<div class="d-grid gap-2">
						<button class="btn btn-primary" type="submit">Login</button>
						<a class="btn btn-outline-secondary d-flex align-items-center justify-content-center" id="login_42">
							<span>Sign in with </span> <img src="/img/42_logo.svg" alt="42" class="ms-2" style="height:1em">
						</a>
					</div>
				</form>
				<p class="text-center mt-3">Don't have an account? <a class="link-primary" id="sign_up" href="#" data-link="/register">Sign Up</a></p>
			</div>
		</div>
	</div>
</div>
